<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎂 Cute Cake</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffe1ec, #ffd6e8, #e1f0ff);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .banner {
    font-size: 1.6em;
    font-weight: bold;
    color: #d6336c;
    text-shadow: 1px 1px 0 #fff;
    opacity: 0;
    transform: translateY(10px) scale(0.9);
    transition: all 0.6s ease;
    margin-bottom: 6px;
    text-align: center;
    min-height: 1.4em;
  }

  .banner.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .cake {
    position: relative;
    width: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .plate {
    width: 300px;
    height: 20px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 8px 15px rgba(0,0,0,0.15);
    margin-top: -8px;
  }

  .layer {
    width: 220px;
    height: 60px;
    background: linear-gradient(#ffb6c1, #ff9ab0);
    border-radius: 10px;
    position: relative;
    box-shadow: inset 0 -6px 0 rgba(0,0,0,0.08);
  }

  .layer.middle {
    width: 240px;
    background: linear-gradient(#ffc9de, #ffb0cf);
  }

  .layer.bottom {
    width: 260px;
    background: linear-gradient(#ffd3e6, #ffbfd9);
  }

  .drip {
    position: absolute;
    top: -14px;
    left: 0;
    width: 100%;
    height: 20px;
    background: repeating-radial-gradient(circle at 10px 0, #fff 0 8px, transparent 9px 20px);
    opacity: 0.9;
  }

  .sprinkle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 2px;
  }

  .candle {
    width: 8px;
    height: 40px;
    background: repeating-linear-gradient(#ffe08a, #ffe08a 6px, #fbb 6px, #fbb 12px);
    border-radius: 3px;
    margin-bottom: -2px;
    position: relative;
    z-index: 2;
    cursor: pointer;
  }

  .flame {
    width: 14px;
    height: 22px;
    background: radial-gradient(circle at 50% 70%, #fff59d, #ff9800 60%, #ff5722);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: absolute;
    top: -20px;
    left: -3px;
    transform-origin: bottom center;
    animation: flicker 0.6s infinite alternate ease-in-out;
    box-shadow: 0 0 12px 4px rgba(255,150,50,0.6);
    cursor: pointer;
  }

  @keyframes flicker {
    0%   { transform: scale(1) rotate(-3deg); }
    50%  { transform: scale(1.08) rotate(2deg); }
    100% { transform: scale(0.95) rotate(-1deg); }
  }

  .flame.out {
    animation: none;
    opacity: 0;
    box-shadow: none;
  }

  .smoke {
    position: absolute;
    top: -30px;
    left: 0;
    width: 6px;
    height: 6px;
    background: rgba(150,150,150,0.5);
    border-radius: 50%;
    opacity: 0;
  }

  .smoke.show {
    animation: smokeUp 1.4s ease-out forwards;
  }

  @keyframes smokeUp {
    0%   { opacity: 0.6; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-40px) scale(3); }
  }

  .hint {
    color: #b85c7d;
    margin-top: 20px;
    font-size: 1em;
    text-align: center;
  }

  button {
    margin-top: 16px;
    padding: 10px 22px;
    border: none;
    border-radius: 30px;
    background: #ff6f91;
    color: white;
    font-weight: bold;
    font-size: 1em;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(255,111,145,0.4);
    transition: transform 0.15s ease;
  }
    .gift-button:hover {
      
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
  }

  button:hover { transform: translateY(-2px); }
  button:active { transform: translateY(1px) scale(0.97); }

  .letter-drop {
    position: fixed;
    top: -20px;
    font-weight: bold;
    font-size: 1.1em;
    color: #d6336c;
    opacity: 0.9;
    animation: fall linear forwards;
    pointer-events: none;
  }

  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="banner" id="banner"></div>
  <div class="candle" id="candle">
    <div class="flame" id="flame"></div>
    <div class="smoke" id="smoke"></div>
  </div>
  <div class="cake" id="cake">
    <div class="layer top"><div class="drip"></div></div>
    <div class="layer middle"></div>
    <div class="layer bottom"></div>
  </div>
  <div class="plate"></div>
  <p class="hint" id="hint">Click the candle to blow it out 🕯️</p>
  <button id="relight">Relight candle 🔥</button>
</div>

<script>
  const flame = document.getElementById('flame');
  const smoke = document.getElementById('smoke');
  const candle = document.getElementById('candle');
  const banner = document.getElementById('banner');
  const hint = document.getElementById('hint');
  const relightBtn = document.getElementById('relight');

  const MESSAGE = "Happy Birthday Shebelaye";
  const sprinkleColors = ['#ffdd57', '#4dd0e1', '#ba68c8', '#81c784', '#ff8a65', '#fff'];

  function addSprinkles() {
    document.querySelectorAll('.layer').forEach(layer => {
      for (let i = 0; i < 10; i++) {
        const s = document.createElement('div');
        s.className = 'sprinkle';
        s.style.left = Math.random() * 90 + '%';
        s.style.top = Math.random() * 70 + 15 + '%';
        s.style.background = sprinkleColors[Math.floor(Math.random() * sprinkleColors.length)];
        s.style.transform = `rotate(${Math.random()*360}deg)`;
        layer.appendChild(s);
      }
    });
  }
  addSprinkles();

  function blowOut() {
    if (flame.classList.contains('out')) return;
    flame.classList.add('out');
    smoke.classList.add('show');
    hint.textContent = 'Make a wish! ✨';
    banner.textContent = MESSAGE;
    banner.classList.add('show');
    dropLetters();
  }

  function relight() {
    flame.classList.remove('out');
    smoke.classList.remove('show');
    banner.classList.remove('show');
    banner.textContent = '';
    hint.textContent = 'Click the candle to blow it out 🕯️';
  }

  candle.addEventListener('click', blowOut);
  flame.addEventListener('click', blowOut);
  relightBtn.addEventListener('click', relight);

  function dropLetters() {
    const colors = ['#ff6f91', '#d6336c', '#845ec2', '#00c2a8', '#ffc75f'];
    const chars = MESSAGE.replace(/\s/g, '').split('');
    // drop a few rounds of letters for a fuller effect
    for (let round = 0; round < 3; round++) {
      chars.forEach((ch, i) => {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'letter-drop';
          el.textContent = ch;
          el.style.left = Math.random() * 100 + 'vw';
          el.style.color = colors[Math.floor(Math.random() * colors.length)];
          el.style.fontSize = (0.8 + Math.random() * 0.8) + 'em';
          el.style.animationDuration = (Math.random() * 1.5 + 1.8) + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 3600);
        }, round * 400 + i * 60);
      });
    }
  }
</script>
<div>
 <a href="memories.html" >

      <button class="gift-button">Open your gift</button>
      </a>
      </div>

</body>
</html>
